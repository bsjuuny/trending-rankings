name: Build and Deploy to Cafe24
on:
  push:
    branches:
      - main
  schedule:
    # 매 30분마다 주기적으로 실행 (0분, 30분)
    - cron: '0,30 * * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Puppeteer dependencies
        run: |
          sudo npx puppeteer browsers install chrome --install-deps

      - name: Build project
        run: npm run build
        # 빌드 과정에서 환경 변수가 필요하면 아래 주석을 해제하고 추가하세요.
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: ✨ Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/trendingrankings/
          state-name: .sync-state-trending-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: 📋 Generate Trending Summary
        if: success()
        run: |
          echo "TRENDING_SUMMARY<<EOF" >> $GITHUB_ENV
          npm run generate:summary >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 📢 Notify Telegram on Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ <b>Trending Rankings</b> 배포 성공!
            
            ${{ env.TRENDING_SUMMARY }}
            
            🔗 웹사이트: <a href="https://bsjuuny2026.mycafe24.com/trendingrankings/">바로가기</a>
            🔗 리포지토리: <a href="${{ github.server_url }}/${{ github.repository }}/actions">확인하기</a>
            
          format: html

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ <b>Trending Rankings</b> 배포 실패!
            
            빌드 또는 배포 과정에서 오류가 발생했습니다. GitHub Actions 로그를 확인해 주세요.
            🔗 리포지토리: <a href="${{ github.server_url }}/${{ github.repository }}/actions">확인하기</a>
          format: html
