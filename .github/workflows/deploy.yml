name: Build and Deploy to Cafe24
on:
  push:
    branches:
      - main
  schedule:
    # 매 30분마다 주기적으로 실행 (0분, 30분)
    - cron: '0,30 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        shell: pwsh
        run: npm ci; if ($LASTEXITCODE -ne 0) { npm install }

      - name: Install Puppeteer dependencies
        run: npx puppeteer browsers install chrome

      - name: Build project
        run: npx next build --no-turbopack
        # 빌드 과정에서 환경 변수가 필요하면 아래 주석을 해제하고 추가하세요.
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: ✨ Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/trendingrankings/
          state-name: .sync-state-trending-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: 📢 Notify Telegram on Success
        if: success()
        shell: pwsh
        run: |
          $msg = "✅ Trending Rankings 배포 성공!`n🔗 https://bsjuuny2026.mycafe24.com/trendingrankings/"
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $body -ContentType "application/json"

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        shell: pwsh
        run: |
          $msg = "❌ Trending Rankings 배포 실패! Actions 로그를 확인해 주세요."
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $body -ContentType "application/json"
