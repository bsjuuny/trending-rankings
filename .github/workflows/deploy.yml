name: Build and Deploy to Cafe24
on:
  push:
    branches:
      - main
  schedule:
    # 매 30분마다 주기적으로 실행 (0분, 30분)
    - cron: '0,30 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        shell: powershell
        run: npm ci; if ($LASTEXITCODE -ne 0) { npm install }

      - name: Install Puppeteer dependencies
        shell: powershell
        run: npx puppeteer browsers install chrome

      - name: Build project
        shell: powershell
        run: npx next build
        # 빌드 과정에서 환경 변수가 필요하면 아래 주석을 해제하고 추가하세요.
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: ✨ Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/trendingrankings/
          state-name: .sync-state-trending-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: 📋 Generate Trending Summary
        if: success()
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $summary = (npm run generate:summary 2>&1) | Where-Object { $_ -notmatch "^>" -and $_ -notmatch "^$" -and $_ -notmatch "trending-rankings" } | Out-String
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TRENDING_SUMMARY<<EOF`n$($summary.Trim())`nEOF`n", [System.Text.Encoding]::UTF8)

      - name: 📢 Notify Telegram on Success
        if: success()
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TRENDING_SUMMARY: ${{ env.TRENDING_SUMMARY }}
        run: node scripts/notify-telegram.js success

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        shell: powershell
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/notify-telegram.js failure
