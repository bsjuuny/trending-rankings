name: Build and Deploy to Cafe24
on:
  push:
    branches:
      - main
  schedule:
    # 매 30분마다 주기적으로 실행 (0분, 30분)
    - cron: '0,30 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        shell: powershell
        run: npm ci; if ($LASTEXITCODE -ne 0) { npm install }

      - name: Install Puppeteer dependencies
        shell: powershell
        run: npx puppeteer browsers install chrome

      - name: Build project
        shell: powershell
        run: npx next build
        # 빌드 과정에서 환경 변수가 필요하면 아래 주석을 해제하고 추가하세요.
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: ✨ Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/trendingrankings/
          state-name: .sync-state-trending-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: 📋 Generate Trending Summary
        if: success()
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $summary = (npm run generate:summary 2>&1) | Where-Object { $_ -notmatch "^>" -and $_ -notmatch "^$" -and $_ -notmatch "trending-rankings" } | Out-String
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TRENDING_SUMMARY<<EOF`n$($summary.Trim())`nEOF`n", [System.Text.Encoding]::UTF8)

      - name: 📢 Notify Telegram on Success
        if: success()
        continue-on-error: true
        shell: powershell
        run: |
          $header_b64 = "4pyFIDxiPlRyZW5kaW5nIFJhbmtpbmdzIOuwsO2PrCDshLHqs7UhPC9iPg=="
          $footer_b64 = "8J+UlyDsm7nsgqzsnbTtirg6IDxhIGhyZWY9Imh0dHBzOi8vYnNqdXVueTIwMjYubXljYWZlMjQuY29tL3RyZW5kaW5ncmFua2luZ3MvIj7rsJTroZzqsIDquLA8L2E+CvCflJcg66as7Y+s7KeA7Yag66asOiA8YSBocmVmPSJodHRwczovL2dpdGh1Yi5jb20vYnNqdXVueS90cmVuZGluZy1yYW5raW5ncy9hY3Rpb25zIj7tmZXsnbjtlZjquLA8L2E+"
          $div_b64 = "4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA"
          $header = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($header_b64))
          $footer = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($footer_b64))
          $divider = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($div_b64))
          $summary = "${{ env.TRENDING_SUMMARY }}"
          $msg = "$header`n`n$divider`n$summary`n$divider`n`n$footer"
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        continue-on-error: true
        shell: powershell
        run: |
          $msg_b64 = "4p2MIDxiPlRyZW5kaW5nIFJhbmtpbmdzIOuwsO2PrCDsi6TtjKghPC9iPgoK67mM65OcIOuYkOuKlCDrsLDtj6wg6rO87KCV7JeQ7IScIOyYpOulmOqwgCDrsJzsg53tlojsirXri4jri6QuCvCflJcg66as7Y+s7KeA7Yag66asOiA8YSBocmVmPSJodHRwczovL2dpdGh1Yi5jb20vYnNqdXVueS90cmVuZGluZy1yYW5raW5ncy9hY3Rpb25zIj7tmZXsnbjtlZjquLA8L2E+"
          $msg = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($msg_b64))
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"
