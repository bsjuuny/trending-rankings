name: Build and Deploy to Cafe24
on:
  push:
    branches:
      - main
  # schedule 비활성화 — PM2 스케줄러(run-trending-rankings.mjs)가 동일 작업을 수행하므로 중복 방지
  # schedule:
  #   - cron: '0,30 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -Command ". '{0}'"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { npm install }

      - name: Install Puppeteer dependencies
        run: npx puppeteer browsers install chrome

      - name: Build project
        run: npx next build
        # 빌드 과정에서 환경 변수가 필요하면 아래 주석을 해제하고 추가하세요.
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: ✨ Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/trendingrankings/
          state-name: .sync-state-trending-v3.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: 📋 Generate Trending Summary
        if: success()
        run: npm run generate:summary

      - name: 📢 Notify Telegram on Success
        if: success()
        continue-on-error: true
        run: |
          # 1. Prepare components
          $h_b64 = "4pyFIDxiPlRyZW5kaW5nIFJhbmtpbmdzIOuwsO2PrCDshLHqs7UhPC9iPg=="
          $f_b64 = "8J+UlyDsm7nsgqzsnbTtirg6IDxhIGhyZWY9Imh0dHBzOi8vYnNqdXVueTIwMjYubXljYWZlMjQuY29tL3RyZW5kaW5ncmFua2luZ3MvIj7rsJTroZzqsIDquLA8L2E+CvCflJcg66as7Y+s7KeA7Yag66asOiA8YSBocmVmPSJodHRwczovL2dpdGh1Yi5jb20vYnNqdXVueS90cmVuZGluZy1yYW5raW5ncy9hY3Rpb25zIj7tmZXsnbjtlZjquLA8L2E+"
          $d_b64 = "4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA4pSA"
          
          $header = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($h_b64))
          $footer = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($f_b64))
          $divider = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($d_b64))
          $summary = Get-Content -Path "summary.txt" -Raw -Encoding UTF8
          
          # 2. Assemble message
          $msg = $header + "`n`n" + $divider + "`n" + $summary + "`n" + $divider + "`n`n" + $footer
          
          # 3. Send
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        continue-on-error: true
        run: |
          $msg_b64 = "4p2MIDxiPlRyZW5kaW5nIFJhbmtpbmdzIOuwsO2PrCDsi6TtjKghPC9iPgoK67mM65OcIOuYkOuKlCDrsLDtj6wg6rO87KCV7JeQ7IScIOyYpOulmOqwgCDrsJzsg53tlojsirXri4jri6QuCvCflJcg66as7Y+s7KeA7Yag66asOiA8YSBocmVmPSJodHRwczovL2dpdGh1Yi5jb20vYnNqdXVueS90cmVuZGluZy1yYW5raW5ncy9hY3Rpb25zIj7tmZXsnbjtlZjquLA8L2E+"
          $msg = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($msg_b64))
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"
